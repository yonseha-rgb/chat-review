<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>그립 채팅 고정 프로토타입 — 1안 / 2안</title>
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{font-family:'Pretendard Variable',-apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#fff;overflow:hidden;height:100vh;height:100dvh;display:flex;flex-direction:column;align-items:center;user-select:none;-webkit-user-select:none}

/* ===== CONTROL PANEL ===== */
.ctrl{position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(20,20,25,0.92);backdrop-filter:blur(12px);padding:10px 16px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;border-bottom:1px solid rgba(255,255,255,0.08);font-size:12px}
.ctrl .tabs{display:flex;gap:4px}
.ctrl .tabs button{padding:6px 14px;border-radius:20px;font-size:11px;font-weight:600;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.12);color:rgba(255,255,255,0.5);cursor:pointer;font-family:inherit;transition:all .15s}
.ctrl .tabs button.on{background:#ff2d55;border-color:#ff2d55;color:#fff}
.ctrl label{color:rgba(255,255,255,0.5);font-weight:500}
.ctrl select{font-family:inherit;font-size:11px;padding:5px 8px;border-radius:8px;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.08);color:#fff;cursor:pointer}
.ctrl .manual{padding:5px 12px;border-radius:8px;border:none;background:rgba(255,255,255,0.12);color:#fff;font-size:11px;font-family:inherit;font-weight:600;cursor:pointer}

/* ===== PHONE FRAME ===== */
.phone{width:393px;height:852px;position:relative;overflow:hidden;border-radius:0;margin-top:48px;flex-shrink:0}
@media(min-width:500px){.phone{border-radius:44px;border:3px solid #333;margin-top:56px}}

/* ===== LIVE BG ===== */
.phone .bg{position:absolute;inset:0;background:#0a0a0a;z-index:0}
.phone .bg-grad{position:absolute;inset:0;z-index:1;background:linear-gradient(180deg,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0) 15%,rgba(0,0,0,0) 40%,rgba(0,0,0,0.65) 75%,rgba(0,0,0,0.9) 100%)}

/* ===== TOP BAR ===== */
.topbar{position:absolute;top:0;left:0;right:0;z-index:10;padding:52px 16px 0}
.topbar-row{display:flex;align-items:center;justify-content:space-between}
.topbar .brand{font-size:20px;font-weight:800;letter-spacing:-0.5px;color:#fff}
.topbar .app-link{font-size:11px;background:rgba(255,255,255,0.15);padding:4px 10px;border-radius:14px;color:rgba(255,255,255,0.8);font-weight:500}
.topbar .icons{display:flex;gap:12px;align-items:center}
.topbar .icons span{font-size:18px;color:rgba(255,255,255,0.7);cursor:pointer}
.seller-row{display:flex;align-items:center;gap:8px;margin-top:12px}
.seller-avatar{width:36px;height:36px;border-radius:50%;background:#e91e63;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700}
.seller-meta{display:flex;flex-direction:column}
.seller-name{font-size:14px;font-weight:700;display:flex;align-items:center;gap:4px}
.seller-stats{font-size:11px;color:rgba(255,255,255,0.6);display:flex;gap:8px}
.title-row{margin-top:8px;font-size:14px;font-weight:600}
.viewer-bar{margin-top:6px;display:flex;align-items:center;gap:6px;font-size:12px;color:rgba(255,255,255,0.7)}
.viewer-bar .bar{flex:1;height:4px;background:rgba(255,255,255,0.15);border-radius:2px;overflow:hidden}
.viewer-bar .bar-fill{height:100%;background:#ff2d55;border-radius:2px;width:26%}

/* ===== BOTTOM FIXED LAYOUT ===== */
.bottom-fixed{position:absolute;bottom:0;left:0;right:0;z-index:15;display:flex;flex-direction:column}

/* 하단 액션바 (스토어, 입력, 쿠폰, 하트) */
.action-bar{display:flex;align-items:flex-end;gap:12px;padding:0 16px 28px}
.bb-left{display:flex;flex-direction:column;align-items:center;gap:2px}
.bb-store-icon{position:relative;width:36px;height:42px;display:flex;flex-direction:column;align-items:center;justify-content:center}
.bb-store-icon svg{width:28px;height:24px;fill:#fff}
.bb-store-icon .badge{position:absolute;top:-4px;right:-6px;background:#ff2d55;color:#fff;font-size:9px;font-weight:700;min-width:18px;height:18px;border-radius:9px;display:flex;align-items:center;justify-content:center;padding:0 4px}
.bb-store-label{font-size:9px;color:rgba(255,255,255,0.7);font-weight:500}
.bb-input{flex:1;background:rgba(64,65,73,0.3);border:none;border-radius:20px;padding:9px 14px;font-size:13px;color:rgba(255,255,255,0.4);font-family:inherit;outline:none;height:36px}
.bb-right{display:flex;gap:10px;align-items:flex-end}
.bb-coupon{display:flex;flex-direction:column;align-items:center;gap:2px;position:relative}
.bb-coupon svg{width:24px;height:24px;fill:#fff}
.bb-coupon .badge{position:absolute;top:-6px;right:-4px;background:#ff2d55;color:#fff;font-size:9px;font-weight:700;min-width:16px;height:16px;border-radius:8px;display:flex;align-items:center;justify-content:center;padding:0 3px}
.bb-coupon-label{font-size:9px;color:rgba(255,255,255,0.7);font-weight:500}
.bb-heart{display:flex;flex-direction:column;align-items:center;gap:0}
.bb-heart svg{width:28px;height:28px;fill:none;stroke:#fff;stroke-width:2}
.bb-heart-count{font-size:10px;color:rgba(255,255,255,0.7);font-weight:500}

/* Q 칩 (상품 컴포넌트 — 실제 그립 참고) */
.q-chip-area{padding:0 16px 12px;display:flex;align-items:center;gap:8px}
.q-chip{display:flex;align-items:center;gap:6px;background:rgba(40,40,48,0.7);backdrop-filter:blur(10px);border-radius:20px;padding:7px 14px 7px 8px;cursor:pointer}
.q-chip-avatar{width:28px;height:28px;border-radius:50%;background:#e91e63;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;flex-shrink:0}
.q-chip-text{font-size:13px;font-weight:600;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:200px}
.q-chip-arrow{color:rgba(255,255,255,0.4);font-size:14px;flex-shrink:0}
.q-chip-scroll{display:flex;align-items:center;justify-content:center;width:36px;height:36px;border-radius:50%;background:rgba(255,80,100,0.8);flex-shrink:0;font-size:16px;cursor:pointer}

/* ====== 2안: 고정 후기 칩 (Q칩과 동일 사이즈, 인라인 한줄) ====== */
.pinned-chip{display:flex;align-items:center;gap:8px;background:rgba(40,40,48,0.7);backdrop-filter:blur(10px);border-radius:20px;padding:7px 14px 7px 10px;cursor:pointer;margin:0 16px 8px;border:1px solid rgba(255,45,85,0.25);transition:transform .15s;animation:slideIn .4s ease-out}
@keyframes slideIn{from{opacity:0;transform:translateX(-16px)}to{opacity:1;transform:translateX(0)}}
.pinned-chip:active{transform:scale(0.97)}
.pinned-chip .pc-label{font-size:11px;font-weight:700;color:#ff9500;flex-shrink:0;white-space:nowrap}
.pinned-chip .pc-divider{width:1px;height:14px;background:rgba(255,255,255,0.12);flex-shrink:0}
.pinned-chip .pc-text{font-size:13px;color:rgba(255,255,255,0.75);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;min-width:0}
.pinned-chip .pc-arrow{color:rgba(255,255,255,0.35);font-size:14px;flex-shrink:0}

/* ===== CHAT AREA ===== */
.chat-area{position:absolute;left:0;right:0;z-index:10;overflow:hidden;display:flex;flex-direction:column;justify-content:flex-end;mask-image:linear-gradient(to bottom,transparent 0%,black 20%);-webkit-mask-image:linear-gradient(to bottom,transparent 0%,black 20%)}
.chat-list{padding:0 16px;display:flex;flex-direction:column;gap:7px;overflow:hidden}

/* 일반 채팅 — 실제 그립 동일 (버블 없음, 닉네임 인라인) */
.msg{animation:msgUp .3s ease-out;line-height:1.5;text-shadow:0 1px 3px rgba(0,0,0,0.7)}
@keyframes msgUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.msg .nick{font-size:15px;font-weight:700;color:rgba(255,255,255,0.55);margin-right:6px}
.msg .txt{font-size:15px;font-weight:600;color:#fff}

/* 시스템 메시지 */
.msg-sys{font-size:14px;font-weight:600;color:#ff6b9d;animation:msgUp .3s ease-out;text-shadow:0 1px 3px rgba(0,0,0,0.7)}
.msg-sys::before{content:'💘 '}

/* ====== 1안: 고정 후기 — 채팅 내 눈에 띄는 형태 ====== */
.msg-pinned{animation:msgUp .35s ease-out;background:linear-gradient(135deg,rgba(255,45,85,0.18) 0%,rgba(255,149,0,0.12) 100%);border:1px solid rgba(255,45,85,0.35);border-radius:12px;padding:8px 12px;margin:4px 0;cursor:pointer;transition:transform .1s}
.msg-pinned:active{transform:scale(0.98)}
.msg-pinned .pin-tag{display:inline-flex;align-items:center;gap:3px;background:rgba(255,45,85,0.8);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;margin-right:8px;vertical-align:middle}
.msg-pinned .pin-tag svg{width:10px;height:10px;fill:#fff}
.msg-pinned .nick{font-size:14px;font-weight:700;color:#ff9500;margin-right:6px}
.msg-pinned .txt{font-size:14px;font-weight:600;color:rgba(255,255,255,0.95);line-height:1.45}
.msg-pinned .pin-more{display:block;font-size:11px;color:rgba(255,255,255,0.4);margin-top:4px}

/* ===== BOTTOM SHEET ===== */
.bs-overlay{position:absolute;inset:0;background:rgba(0,0,0,0.5);z-index:100;display:none;animation:fadeIn .2s}
.bs-overlay.open{display:block}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
.bs{position:absolute;bottom:0;left:0;right:0;background:#1c1c1e;border-radius:20px 20px 0 0;max-height:65vh;z-index:101;display:none;animation:sheetUp .35s ease-out;overflow:hidden}
.bs.open{display:flex;flex-direction:column}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.bs-handle{width:36px;height:4px;background:rgba(255,255,255,0.2);border-radius:2px;margin:10px auto 0}
.bs-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid rgba(255,255,255,0.06)}
.bs-title{font-size:17px;font-weight:700}
.bs-close{width:28px;height:28px;background:rgba(255,255,255,0.08);border-radius:50%;display:flex;align-items:center;justify-content:center;color:rgba(255,255,255,0.5);font-size:15px;cursor:pointer}
.bs-body{padding:12px 16px 24px;overflow-y:auto;display:flex;flex-direction:column;gap:10px}
.rv{background:rgba(255,255,255,0.05);border-radius:14px;padding:12px 14px;display:flex;gap:10px}
.rv-avatar{width:34px;height:34px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff}
.rv-body{flex:1}
.rv-nick{font-size:12px;font-weight:600;color:rgba(255,255,255,0.55);margin-bottom:3px}
.rv-txt{font-size:14px;color:rgba(255,255,255,0.92);line-height:1.45}
.rv-meta{display:flex;gap:12px;margin-top:5px;font-size:11px;color:rgba(255,255,255,0.35)}

/* ===== TOGGLE ===== */
.hide{display:none!important}
</style>
</head>
<body>

<!-- ===== CONTROL PANEL ===== -->
<div class="ctrl">
  <div class="tabs">
    <button class="on" onclick="setMode(1)">1안 채팅 내 반복</button>
    <button onclick="setMode(2)">2안 고정 컴포넌트</button>
    <button onclick="setMode(3)">1+2안 동시</button>
  </div>
  <label>반복주기</label>
  <select id="sel" onchange="resetTimers()">
    <option value="15000">15초</option>
    <option value="30000" selected>30초</option>
    <option value="45000">45초</option>
    <option value="60000">1분</option>
  </select>
  <button class="manual" onclick="firePinned()">수동 노출</button>
</div>

<!-- ===== PHONE ===== -->
<div class="phone">
  <!-- BG -->
  <div class="bg">
    <svg viewBox="0 0 300 120" style="width:70%;position:absolute;top:38%;left:50%;transform:translate(-50%,-50%)">
      <text x="150" y="70" text-anchor="middle" font-size="48" font-weight="900" fill="#FFD700" stroke="#000" stroke-width="2" font-family="sans-serif">슈퍼무진</text>
      <text x="150" y="105" text-anchor="middle" font-size="18" font-weight="700" fill="#fff" opacity="0.3" font-family="sans-serif">LIVE 방송 화면</text>
    </svg>
  </div>
  <div class="bg-grad"></div>

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-row">
      <div style="display:flex;align-items:center;gap:8px">
        <span class="brand">Grip</span>
        <span class="app-link">앱으로 보기</span>
      </div>
      <div class="icons"><span>🔇</span><span>↗</span><span>✕</span></div>
    </div>
    <div class="seller-row">
      <div class="seller-avatar">아</div>
      <div class="seller-meta">
        <div class="seller-name">아임마빠 💟</div>
        <div class="seller-stats"><span>♥ 1.7만</span><span>👁 3,002</span></div>
      </div>
    </div>
    <div class="title-row">무진창고 네고전🔥</div>
    <div class="viewer-bar">
      <span>⏸</span><span>2600/10000</span>
      <div class="bar"><div class="bar-fill"></div></div>
    </div>
  </div>

  <!-- CHAT AREA (position dynamically set by JS) -->
  <div class="chat-area" id="chatArea">
    <div class="chat-list" id="chatList"></div>
  </div>

  <!-- ===== BOTTOM FIXED AREA ===== -->
  <div class="bottom-fixed">
    <!-- 2안: 고정 후기 칩 (Q칩과 동일 스타일, 인라인 한줄) -->
    <div class="pinned-chip hide" id="pinnedChip" onclick="openSheet()">
      <span class="pc-label">📌 채팅 후기</span>
      <span class="pc-divider"></span>
      <span class="pc-text" id="pcText">호쾌한행복길만걸어요: 진짜 이 가격에 이 퀄리티 대박...</span>
      <span class="pc-arrow">›</span>
    </div>

    <!-- Q 칩 (스크롤 버튼 + 상품 배너) -->
    <div class="q-chip-area">
      <div class="q-chip-scroll" id="scrollBtn">↓</div>
      <div class="q-chip">
        <div class="q-chip-avatar">아</div>
        <span class="q-chip-text">🛍 5만이상 무배</span>
        <span class="q-chip-arrow">›</span>
      </div>
    </div>

    <!-- 하단 액션바 -->
    <div class="action-bar">
      <div class="bb-left">
        <div class="bb-store-icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4v2h16V4zm1 10v-2l-1-5H4l-1 5v2h1v6h10v-6h4v6h2v-6h1zm-9 4H6v-4h6v4z"/></svg>
          <span class="badge">28</span>
        </div>
        <span class="bb-store-label">스토어</span>
      </div>
      <input class="bb-input" placeholder="메시지 입력" readonly>
      <div class="bb-right">
        <div class="bb-coupon">
          <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58s1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41s-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
          <span class="badge">2</span>
          <span class="bb-coupon-label">쿠폰</span>
        </div>
        <div class="bb-heart">
          <svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
          <span class="bb-heart-count">3.4만</span>
        </div>
      </div>
    </div>
  </div>

  <!-- BOTTOM SHEET (공통) -->
  <div class="bs-overlay" id="bsOverlay" onclick="closeSheet()"></div>
  <div class="bs" id="bsSheet">
    <div class="bs-handle"></div>
    <div class="bs-header">
      <div class="bs-title">📌 채팅 후기</div>
      <div class="bs-close" onclick="closeSheet()">✕</div>
    </div>
    <div class="bs-body" id="bsBody"></div>
  </div>
</div>

<script>
// ===== DATA =====
const chats = [
  {n:'친구야안녕',t:'빤쮸좋아여'},{n:'건반사랑',t:'애기들 빤쥬 필요한데요'},{n:'니가잘_',t:'으른꺼해죠요'},
  {n:'두꽁',t:'어른꺼 빤쥬'},{n:'김 삼육',t:'귀엽다'},{n:'니가잘_',t:'애 없음'},{n:'하루 24',t:'귀여워~~'},
  {n:'머시깽이',t:'갑자기 뉴턴?'},{n:'두꽁',t:'3500원 어찌해'},{n:'꽃길만걷자',t:'대박 진짜 예쁘다 ㅠㅠ'},
  {n:'짱구엄마',t:'재고 많이 남았나요?!'},{n:'달콤한오후',t:'사이즈 어떤게 있어요?'},{n:'민트초코파',t:'ㅋㅋㅋ 바로 담았다'},

  {n:'토마토주스',t:'베이지 색 실물 어때요?'},{n:'감성충전',t:'언니 이거 진짜 좋아요 ㅎㅎ'},{n:'라떼한잔',t:'결제했어요!!'},
  {n:'수박바',t:'네고 더 해주세요 ㅋㅋ'},{n:'핑크토끼',t:'크로스백도 나올 예정??'},{n:'냥이집사',t:'남자가 들어도 괜찮죠?'},
  {n:'초코쿠키',t:'무게 얼마나 되나요~'},{n:'바닐라빈',t:'내구성 좋은 편이에요?'},{n:'레몬에이드',t:'가성비 쩔어 대박'},
];

const sysMessages = [
  '친구의 초대로 71명이 놀러왔어요.',
  '친구의 초대로 38명이 놀러왔어요.',

const pinnedReviews = [
  {n:'호쾌한행복길만걸어요',t:'진짜 이 가격에 이 퀄리티 말이 안 돼요 ㅠㅠ 백화점에서 비슷한 거 20만원 주고 샀는데... 바로 담았어요!',h:24,m:'2분 전',bg:'linear-gradient(135deg,#ff9500,#ff2d55)'},
  {n:'마삐언니의쇼핑',t:'지난번 구매했는데 가죽 질감이 진짜 고급져요! 지인한테 어디서 샀냐고 물어봐서 그립 알려줌 ㅋㅋ 재구매하러 왔어요~',h:18,m:'5분 전',bg:'linear-gradient(135deg,#5856d6,#af52de)'},
  {n:'빵떡이맘',t:'엄마 선물로 드렸더니 넘 좋아하셔요!! 포장도 깔끔하고 배송도 빨랐어요 👍',h:12,m:'8분 전',bg:'linear-gradient(135deg,#34c759,#30d158)'},
  {n:'김삼육',t:'3번째 구매인데 매번 퀄리티 동일해요. 가성비 최고 브랜드!',h:9,m:'12분 전',bg:'linear-gradient(135deg,#007aff,#5ac8fa)'},
];

// ===== STATE =====
let mode = 1;
let chatI = 0, sysI = 0, pinI = 0;
let chatTimer, pinTimer, sysTimer;

// ===== LAYOUT =====
function updateLayout() {
  const chatArea = document.getElementById('chatArea');
  const bottomFixed = document.querySelector('.bottom-fixed');
  // bottom-fixed의 높이를 기준으로 chatArea의 bottom 설정
  const bh = bottomFixed.offsetHeight;
  chatArea.style.bottom = (bh + 20) + 'px'; // 20px 여유 마진
  chatArea.style.height = '260px';
}

// ===== MODE =====
function setMode(m) {
  mode = m;
  document.querySelectorAll('.ctrl .tabs button').forEach((b,i) => b.classList.toggle('on', i===m-1));

  const chip = document.getElementById('pinnedChip');
  const show2 = m===2||m===3;
  chip.classList.toggle('hide', !show2);

  // 레이아웃 재계산
  requestAnimationFrame(updateLayout);
  resetTimers();
}

// ===== CHAT =====
function addChat() {
  const c = chats[chatI % chats.length]; chatI++;
  const el = document.createElement('div');
  el.className = 'msg';
  el.innerHTML = `<span class="nick">${c.n}</span><span class="txt">${c.t}</span>`;
  append(el);
}

function addSys() {
  const s = sysMessages[sysI % sysMessages.length]; sysI++;
  const el = document.createElement('div');
  el.className = 'msg-sys';
  el.textContent = s;
  append(el);
}

function addPinned() {
  if (mode === 2) return;
  const r = pinnedReviews[pinI % pinnedReviews.length]; pinI++;
  const el = document.createElement('div');
  el.className = 'msg-pinned';
  el.onclick = openSheet;
  el.innerHTML = `<span class="pin-tag"><svg viewBox="0 0 24 24"><path d="M14 4v5c0 1.12.37 2.16 1 3H9c.65-.86 1-1.9 1-3V4h4m3-2H7c-.55 0-1 .45-1 1s.45 1 1 1h1v5c0 1.66-1.34 3-3 3v2h5.97v7l1 1 1-1v-7H19v-2c-1.66 0-3-1.34-3-3V4h1c.55 0 1-.45 1-1s-.45-1-1-1z"/></svg>후기</span><span class="nick">${r.n}</span><span class="txt">${r.t}</span><span class="pin-more">후기 ${pinnedReviews.length}개 모아보기 ›</span>`;
  append(el);
}

function firePinned() { addPinned(); }

function append(el) {
  const list = document.getElementById('chatList');
  list.appendChild(el);
  while (list.children.length > 35) list.removeChild(list.firstChild);
  el.scrollIntoView({behavior:'smooth',block:'end'});
}

// ===== TIMERS =====
function resetTimers() {
  clearInterval(chatTimer); clearInterval(pinTimer); clearInterval(sysTimer);
  chatTimer = setInterval(addChat, 2200);
  sysTimer = setInterval(addSys, 20000);
  const interval = parseInt(document.getElementById('sel').value);
  pinTimer = setInterval(addPinned, interval);
}

// ===== BOTTOM SHEET =====
function openSheet() {
  document.getElementById('bsOverlay').classList.add('open');
  document.getElementById('bsSheet').classList.add('open');
}
function closeSheet() {
  document.getElementById('bsOverlay').classList.remove('open');
  document.getElementById('bsSheet').classList.remove('open');
}

// ===== INIT =====
(function init() {
  // seed chats
  [{n:'친구야안녕',t:'빤쮸좋아여'},{n:'건반사랑',t:'애기들 빤쥬 필요한데요'},{n:'니가잘_',t:'으른꺼해죠요'},{n:'두꽁',t:'어른꺼 빤쥬'},{n:'김 삼육',t:'귀엽다'},{n:'니가잘_',t:'애 없음'}].forEach(c => {
    const el = document.createElement('div');
    el.className = 'msg';
    el.innerHTML = `<span class="nick">${c.n}</span><span class="txt">${c.t}</span>`;
    document.getElementById('chatList').appendChild(el);
  });
  const sys = document.createElement('div');
  sys.className = 'msg-sys';
  sys.textContent = '친구의 초대로 71명이 놀러왔어요.';
  document.getElementById('chatList').appendChild(sys);

  // bottom sheet reviews
  const bsBody = document.getElementById('bsBody');
  pinnedReviews.forEach(r => {
    bsBody.innerHTML += `<div class="rv"><div class="rv-avatar" style="background:${r.bg}">${r.n[0]}</div><div class="rv-body"><div class="rv-nick">${r.n}</div><div class="rv-txt">${r.t}</div><div class="rv-meta"><span>❤️ ${r.h}</span><span>${r.m}</span></div></div></div>`;
  });

  // rotate pinned chip text
  let pi = 0;
  setInterval(() => {
    const r = pinnedReviews[pi % pinnedReviews.length]; pi++;
    const el = document.getElementById('pcText');
    if (el) el.textContent = `${r.n}: ${r.t}`;
  }, 4000);

  setMode(1);
})();
</script>
</body>
